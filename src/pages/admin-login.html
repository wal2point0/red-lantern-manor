<!doctype html>
<html lang="en" class="h-100" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Restaurant Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="../css/style.css" rel="stylesheet">
  </head>
  <body class="d-flex h-100 text-center" style="background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%); color: rgba(255, 255, 255, 0.9);">
    <div class="container py-4 d-flex flex-column justify-content-center align-items-center" style="min-height:100vh;">
      <a href="../pages/index.html" class="btn btn-light position-absolute top-0 end-0 m-3">Back to Store</a>
      <div class="card bg-dark border-warning w-100" style="max-width: 480px;">
        <div class="card-body text-center">
          <h1>Admin Dashboard</h1>
          <h3 class="mb-3">🔐 Admin Login</h3>
          <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input id="adminUsername" type="text" class="form-control" placeholder="admin" value="admin" />
          </div>
          <div class="mb-3 text-start">
            <label class="form-label">Password</label>
            <input id="adminPassword" type="password" class="form-control" placeholder="password" value="password" />
          </div>
          <button id="adminLoginBtn" class="btn btn-primary w-100">Login</button>
          <small class="text-muted d-block mt-2">Default: admin / password</small>
        </div>
      </div>
      <p class="text-muted mt-3">You will be redirected to the admin dashboard after login.</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(function() {
        $('#adminLoginBtn').click(function() {
          const username = $('#adminUsername').val().trim().toLowerCase();
          const password = $('#adminPassword').val().trim();

          if (username === 'admin' && password === 'password') {
            sessionStorage.setItem('isAdminLoggedIn', 'true');
            // Set session expiry for 30 minutes
            const exp = Date.now() + (30 * 60 * 1000);
            sessionStorage.setItem('adminSessionExpiry', exp);
            window.location.href = 'admin-dashboard.html';
          } else {
            alert('❌ Invalid credentials. Use admin / password');
          }
        });
      });
    </script>
  </body>
</html>
